server {
    listen 80;

    # Captura o subdomínio: matcon.atendimentoweb.com → $subdomain = matcon
    server_name ~^(?<subdomain>[^.]+)\.atendimentoweb\.com$;

    root /lps;
    charset utf-8;

    location / {
        # Serve /<subdomain>.html (ex: /matcon.html)
        try_files /$subdomain.html =404;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Served-By "lps-server";
        add_header X-LP-Subdomain $subdomain;
    }

    # Evita logs de favicon
    location = /favicon.ico { return 204; access_log off; log_not_found off; }

    error_page 404 /404.html;
    location = /404.html {
        return 404 '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>404</title><style>body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#000;color:#86868B}</style></head><body><div style="text-align:center"><div style="font-size:48px;margin-bottom:16px">🔗</div><div style="font-size:18px;font-weight:700;color:#F5F5F7;margin-bottom:8px">Página não encontrada</div><div style="font-size:14px">Este subdomínio ainda não possui uma landing page publicada.</div></div></body></html>';
        add_header Content-Type text/html;
    }
}
